name: Spoogle

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 3'
      timezone: 'Europe/Oslo'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: "read"
      id-token: "write"
    name: Bygg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          package_json_file: "spoogle-frontend/package.json"

      - name: Setup Node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.x
          cache: "pnpm"
          cache-dependency-path: "spoogle-frontend/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: spoogle-frontend

      - name: Run lint
        run: pnpm run lint
        working-directory: spoogle-frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: spoogle-frontend

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Test og bygg
        run: ./gradlew :spoogle-backend:build :spoogle-backend:installDist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lag Docker image
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: tbd
          cache_from: type=gha
          cache_to: type=gha,mode=max
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  analyze:
    name: Kontroller sårbarheter
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["kotlin"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.37.1
        with:
          languages: ${{ matrix.language }}
          tools: linked

      - name: Setup Java
        uses: actions/setup-java@v5.5.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build
        run: ./gradlew clean build --no-build-cache -x test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.37.1
        with:
          category: "/language:${{matrix.language}}"

  deployDev:
    name: Deploy til dev
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: deploy/dev.yml
          IMAGE: ${{ needs.build.outputs.image }}

  deployProd:
    name: Deploy til prod
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: deploy/prod.yml
          IMAGE: ${{ needs.build.outputs.image }}
