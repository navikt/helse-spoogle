name: Spoogle-opprydding-dev

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 3'
      timezone: 'Europe/Oslo'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: "read"
      id-token: "write"
    name: build docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
      - name: test and build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :spoogle-opprydding-dev:build :spoogle-opprydding-dev:installDist
      - uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: 'tbd'
          dockerfile: Dockerfile-opprydding-dev
          image_suffix: opprydding-dev
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

  deployDev:
    name: deploy to dev
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: deploy/dev-opprydding.yml,deploy/dev-db-policy.yml
          IMAGE: ${{ needs.build.outputs.image }}
